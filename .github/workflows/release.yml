name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "VS Code version to build from (e.g. 1.121.0)"
        required: false
        default: "1.121.0"
      platform:
        description: "Platform to build (win / mac / linux / all)"
        required: false
        default: "all"
      skip_sign:
        description: "Skip code signing"
        type: boolean
        default: true

permissions:
  contents: write

env:
  NODE_OPTIONS: "--max-old-space-size=8192"
  VSCODE_VERSION: ${{ github.event.inputs.version || '1.121.0' }}

jobs:
  # ─── Windows ──────────────────────────────────────────────────────────────
  build-windows:
    if: github.event.inputs.platform == 'win' || github.event.inputs.platform == 'all' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python setuptools (for node-gyp)
        run: pip install setuptools

      - name: Cache VS Code source
        uses: actions/cache@v4
        with:
          path: vscode-source
          key: vscode-${{ env.VSCODE_VERSION }}-win-${{ hashFiles('product.json') }}
          restore-keys: |
            vscode-${{ env.VSCODE_VERSION }}-win-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            vscode-source/node_modules
          key: nm-win-${{ hashFiles('package.json') }}
          restore-keys: |
            nm-win-

      - name: Prepare VS Code source
        run: bash scripts/prepare-vscode.sh --version ${{ env.VSCODE_VERSION }}
        shell: bash

      - name: Install project dependencies
        run: npm install --ignore-scripts
        shell: bash
        working-directory: .

      - name: Install VS Code dependencies
        run: npm install
        shell: bash
        working-directory: vscode-source

      - name: Compile VS Code source
        run: npm run compile 2>&1 | tail -30
        shell: bash
        working-directory: vscode-source

      - name: Copy compiled output
        run: |
          rm -rf out 2>/dev/null || true
          cp -r vscode-source/out ./out
          # Do NOT overwrite our product.json with VS Code's — ours has VibeCode branding
        shell: bash

      - name: Verify product.json branding
        run: |
          echo "=== Checking product.json branding ==="
          node -e "const p = require('./product.json'); console.log('nameShort:', p.nameShort); console.log('nameLong:', p.nameLong); console.log('applicationName:', p.applicationName); console.log('win32DirName:', p.win32DirName); if(p.nameShort !== 'VibeCode') { console.error('ERROR: product.json not branded!'); process.exit(1); }"
        shell: bash

      - name: Install Electron
        run: npx electron-builder install-app-deps
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows installer (NSIS)
        run: npx electron-builder --win --x64 --publish never
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem -Path dist -Recurse -File | ForEach-Object { Write-Output "$($_.Name)  ($([math]::Round($_.Length/1MB, 1)) MB)" }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: warn
          retention-days: 30

  # ─── macOS ────────────────────────────────────────────────────────────────
  build-macos:
    if: github.event.inputs.platform == 'mac' || github.event.inputs.platform == 'all' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python setuptools (for node-gyp)
        run: pip install setuptools

      - name: Cache VS Code source
        uses: actions/cache@v4
        with:
          path: vscode-source
          key: vscode-${{ env.VSCODE_VERSION }}-mac-${{ hashFiles('product.json') }}
          restore-keys: |
            vscode-${{ env.VSCODE_VERSION }}-mac-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            vscode-source/node_modules
          key: nm-mac-${{ hashFiles('package.json') }}
          restore-keys: |
            nm-mac-

      - name: Prepare VS Code source
        run: bash scripts/prepare-vscode.sh --version ${{ env.VSCODE_VERSION }}
        shell: bash

      - name: Install project dependencies
        run: npm install --ignore-scripts
        shell: bash

      - name: Install VS Code dependencies
        run: npm install
        shell: bash
        working-directory: vscode-source

      - name: Compile VS Code source
        run: npm run compile 2>&1 | tail -30
        shell: bash
        working-directory: vscode-source

      - name: Copy compiled output
        run: |
          rm -rf out 2>/dev/null || true
          cp -r vscode-source/out ./out
          # Do NOT overwrite our product.json with VS Code's — ours has VibeCode branding
        shell: bash

      - name: Verify product.json branding
        run: |
          echo "=== Checking product.json branding ==="
          node -e "const p = require('./product.json'); console.log('nameShort:', p.nameShort); console.log('nameLong:', p.nameLong); console.log('applicationName:', p.applicationName); console.log('win32DirName:', p.win32DirName); if(p.nameShort !== 'VibeCode') { console.error('ERROR: product.json not branded!'); process.exit(1); }"
        shell: bash

      - name: Install Electron
        run: npx electron-builder install-app-deps
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS DMG
        run: npx electron-builder --mac --x64 --arm64 --publish never
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: List build artifacts
        run: find dist -type f -exec ls -lh {} \;
        shell: bash

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: warn
          retention-days: 30

  # ─── Linux ────────────────────────────────────────────────────────────────
  build-linux:
    if: github.event.inputs.platform == 'linux' || github.event.inputs.platform == 'all' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python setuptools (for node-gyp)
        run: pip install setuptools

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbfile-dev libsecret-1-dev libkrb5-dev libxss1 libgbm1 rpm

      - name: Cache VS Code source
        uses: actions/cache@v4
        with:
          path: vscode-source
          key: vscode-${{ env.VSCODE_VERSION }}-linux-${{ hashFiles('product.json') }}
          restore-keys: |
            vscode-${{ env.VSCODE_VERSION }}-linux-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            vscode-source/node_modules
          key: nm-linux-${{ hashFiles('package.json') }}
          restore-keys: |
            nm-linux-

      - name: Prepare VS Code source
        run: bash scripts/prepare-vscode.sh --version ${{ env.VSCODE_VERSION }}
        shell: bash

      - name: Install project dependencies
        run: npm install --ignore-scripts
        shell: bash

      - name: Install VS Code dependencies
        run: npm install
        shell: bash
        working-directory: vscode-source

      - name: Compile VS Code source
        run: npm run compile 2>&1 | tail -30
        shell: bash
        working-directory: vscode-source

      - name: Copy compiled output
        run: |
          rm -rf out 2>/dev/null || true
          cp -r vscode-source/out ./out
          # Do NOT overwrite our product.json with VS Code's — ours has VibeCode branding
        shell: bash

      - name: Verify product.json branding
        run: |
          echo "=== Checking product.json branding ==="
          node -e "const p = require('./product.json'); console.log('nameShort:', p.nameShort); console.log('nameLong:', p.nameLong); console.log('applicationName:', p.applicationName); console.log('win32DirName:', p.win32DirName); if(p.nameShort !== 'VibeCode') { console.error('ERROR: product.json not branded!'); process.exit(1); }"
        shell: bash

      - name: Install Electron
        run: npx electron-builder install-app-deps
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux packages
        run: npx electron-builder --linux --x64 --publish never
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        run: find dist -type f -exec ls -lh {} \;
        shell: bash

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.blockmap
            dist/latest-linux.yml
          if-no-files-found: warn
          retention-days: 30

  # ─── Release ──────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          body: |
            ## VibeCode ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows x64 | `VibeCode-Setup-*.exe` | NSIS installer (recommended) |
            | macOS x64/ARM | `VibeCode-*.dmg` | Universal binary |
            | Linux x64 | `VibeCode-*.AppImage` | Portable — chmod +x and run |
            | Linux x64 | `VibeCode-*.deb` | Debian/Ubuntu package |
            | Linux x64 | `VibeCode-*.rpm` | Fedora/RHEL package |

            > ⚠️ **Windows**: You may see a SmartScreen warning because the app is not code-signed yet.
            > Click **"More info"** → **"Run anyway"** to proceed.

            > ⚠️ **macOS**: Right-click the app → **"Open"** the first time.
            > Go to **System Settings → Privacy & Security** to allow if blocked.

            ---

            Built from VS Code `${{ env.VSCODE_VERSION }}` source.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
