# =============================================================================
# Real Vibecode — electron-builder configuration
# =============================================================================
# Full desktop build configuration for Windows (NSIS), macOS (DMG),
# and Linux (AppImage / DEB / RPM) packaging.
#
# Docs: https://www.electron.build/configuration/configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Core metadata — must stay in sync with product.json
# ---------------------------------------------------------------------------
appId: com.realvibecode.ide
productName: Real Vibecode
copyright: Copyright (C) 2026 Real Vibecode Project. All rights reserved

# ---------------------------------------------------------------------------
# Build directories & output
# ---------------------------------------------------------------------------
directories:
  output: dist
  buildResources: resources

# ---------------------------------------------------------------------------
# Artifact naming: RealVibecode-{version}-{platform}-{arch}
# ---------------------------------------------------------------------------
artifactName: "RealVibecode-${version}-${platform}-${arch}.${ext}"

# ---------------------------------------------------------------------------
# ASAR packaging
# ---------------------------------------------------------------------------
asar: true
asarUnpack:
  - "**/*.node"
  - "**/node_modules/sharp/**/*"
  - "**/node_modules/@vscode/**/*.node"
  - "**/node_modules/native-keymap/**/*"
  - "**/node_modules/spdlog/**/*"
  - "**/node_modules/node-pty/**/*"

# ---------------------------------------------------------------------------
# File patterns to include / exclude from the packaged app
# ---------------------------------------------------------------------------
files:
  - "out/**/*"
  - "product.json"
  - "LICENSE.txt"
  - "ThirdPartyNotices.txt"
  - "resources/**/*"
  - "!resources/linux/rpm"
  - "!resources/linux/debian"
  - "!resources/linux/snap"
  - "!resources/win32/appx"
  - "!resources/win32/inno-big-*.bmp"
  - "!resources/win32/inno-small-*.bmp"
  - "!resources/completions"
  - "!docs/**/*"
  - "!scripts/**/*"
  - "!build/**/*"
  - "!src/**/*"
  - "!test/**/*"
  - "!extensions/**/*"
  - "!.eslintrc.*"
  - "!.editorconfig"
  - "!tsconfig*.json"
  - "!gulpfile.*"

extraResources:
  - from: "resources/linux/code-workspace.xml"
    to: "code-workspace.xml"
    filter:
      - "**/*"

# ---------------------------------------------------------------------------
# File associations — .vibecode files
# ---------------------------------------------------------------------------
fileAssociations:
  - ext: vibecode
    name: Vibecode Project
    description: Real Vibecode Project File
    mimeType: application/x-vibecode
    role: Editor
    icon: resources/win32/code.ico

# ---------------------------------------------------------------------------
# Protocol handlers — vibecode://
# ---------------------------------------------------------------------------
protocols:
  - name: vibecode
    schemes:
      - vibecode
    role: Editor

# ---------------------------------------------------------------------------
# Auto-update configuration
# ---------------------------------------------------------------------------
# Using GitHub Releases as the update source.
# The CI workflow (release.yml) publishes artifacts to GitHub Releases on tag push.
# electron-builder will check for updates at this URL.
publish:
  provider: github
  owner: Razisafir
  repo: Real-vibecode
  releaseType: release
  vPrefixedTagName: true

# ---------------------------------------------------------------------------
# Windows — NSIS installer
# ---------------------------------------------------------------------------
win:
  icon: resources/win32/code.ico
  executableName: RealVibecode
  legalTrademarks: "Real Vibecode is a trademark of the Real Vibecode Project."
  requestedExecutionLevel: asInvoker
  verifyUpdateCodeSignature: true
  signAndEditExecutable: true
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - en_US
    - de_DE
    - es_ES
    - fr_FR
    - it_IT
    - ja_JP
    - ko_KR
    - pt_BR
    - ru_RU
    - zh_CN
    - zh_TW
  language: "1033" # English (US) as default
  installerIcon: resources/win32/code.ico
  uninstallerIcon: resources/win32/code.ico
  installerHeaderIcon: resources/win32/code.ico
  installerHeader: null # use default header banner
  installerSidebar: null # use default sidebar bitmap
  shortcutName: "Real Vibecode"
  artifactName: "RealVibecode-Setup-${version}-${arch}.${ext}"
  include: build/win32/installer.nsh
  guid: "RealVibecode" # Matches win32RegValueName from product.json
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  menuCategory: true
  differentialPackage: true
  # NSIS customizations matching VS Code's installer behavior
  warningsAsErrors: false
  # License and README shown during install
  license: LICENSE.txt

# ---------------------------------------------------------------------------
# macOS — DMG + hardened runtime
# ---------------------------------------------------------------------------
mac:
  icon: resources/darwin/code.icns
  category: public.app-category.developer-tools
  entitlements: build/darwin/entitlements.mac.plist
  entitlementsInherit: build/darwin/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  strictVerify: false
  extendInfo:
    CFBundleName: "Real Vibecode"
    CFBundleDisplayName: "Real Vibecode"
    CFBundleShortVersionString: "${version}"
    CFBundleVersion: "${version}"
    NSHumanReadableCopyright: "Copyright (C) 2026 Real Vibecode Project. All rights reserved."
    CFBundleDocumentTypes:
      - CFBundleTypeName: Vibecode Project
        CFBundleTypeRole: Editor
        CFBundleTypeExtensions:
          - vibecode
        LSItemContentTypes:
          - com.realvibecode.vibecode
        LSHandlerRank: Owner
    CFBundleURLTypes:
      - CFBundleURLName: "com.realvibecode.ide"
        CFBundleURLSchemes:
          - vibecode
    LSMinimumSystemVersion: "12.0.0"
    NSRequiresAquaSystemAppearance: false
    NSSupportsAutomaticGraphicsSwitching: true
    NSAppleEventsUsageDescription: "Real Vibecode needs to send Apple Events to integrate with other applications."
    NSDesktopFolderUsageDescription: "Real Vibecode needs access to your Desktop folder to open and save files."
    NSDocumentsFolderUsageDescription: "Real Vibecode needs access to your Documents folder to open and save files."
    NSDownloadsFolderUsageDescription: "Real Vibecode needs access to your Downloads folder to open and save files."
    NSNetworkVolumesUsageDescription: "Real Vibecode needs access to network volumes to open and save files."
    NSRemovableVolumesUsageDescription: "Real Vibecode needs access to removable volumes to open and save files."
    com.apple.security.cs.allow-jit: true
    com.apple.security.cs.allow-unsigned-executable-memory: true
    com.apple.security.cs.disable-library-validation: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  artifactName: "RealVibecode-${version}-mac-${arch}.${ext}"
  background: null # use default DMG background
  backgroundColor: "#2B2B2B"
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 180
    - x: 400
      y: 180
      type: link
      path: /Applications
  title: "Real Vibecode ${version}"

# ---------------------------------------------------------------------------
# Linux — AppImage (primary), DEB, RPM
# ---------------------------------------------------------------------------
linux:
  icon: resources/linux
  category: Development;IDE;TextEditor;
  executableName: real-vibecode
  synopsis: "AI-Native Code Editing. Redefined."
  description: "Real Vibecode is an AI-native IDE built on a forked architecture, combining the power of an AI execution kernel with a proven code editor foundation. It provides an authoritative mutation control layer and a causal execution graph engine for transparent, auditable AI-driven development."
  maintainer: "Real Vibecode Project <https://github.com/Razisafir/Real-vibecode>"
  vendor: "Real Vibecode Project"
  desktop:
    Name: "Real Vibecode"
    Comment: "AI-Native Code Editing. Redefined."
    GenericName: "Text Editor"
    StartupWMClass: "Real Vibecode"
    Categories: "TextEditor;Development;IDE;"
    MimeType: "application/x-vibecode;application/x-real-vibecode-workspace;"
    Keywords: "real-vibecode;ai;editor;vibecode;"
    StartupNotify: "true"
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
        - arm64

appImage:
  artifactName: "RealVibecode-${version}-linux-${arch}.AppImage"
  license: LICENSE.txt

deb:
  artifactName: "RealVibecode-${version}-linux-${arch}.deb"
  depends:
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - libsecret-1-0
    - libgbm1
    - libasound2
    - libatk-bridge2.0-0
    - libgtk-3-0
  soft Depends:
    - libcurl4 | libcurl3
  category: devel
  priority: optional
  afterInstall: build/linux/postinst.sh
  afterRemove: build/linux/postrm.sh

rpm:
  artifactName: "RealVibecode-${version}-linux-${arch}.rpm"
  depends:
    - libnotify
    - nss
    - libXScrnSaver
    - libXtst
    - libsecret
    - mesa-libgbm
    - alsa-lib
    - at-spi2-atk
    - gtk3
  category: Development/Tools

# ---------------------------------------------------------------------------
# Snap (optional — for Ubuntu Snap Store)
# ---------------------------------------------------------------------------
snap:
  artifactName: "RealVibecode-${version}-linux-${arch}.snap"
  plugs:
    - default
    - desktop
    - desktop-legacy
    - x11
    - unity7
    - browser-support
    - network
    - gsettings
    - pulseaudio
    - opengl
    - home
    - removable-media

# ---------------------------------------------------------------------------
# Compression & performance
# ---------------------------------------------------------------------------
compression: xz

# ---------------------------------------------------------------------------
# Node.js / Electron version overrides (set during CI)
# ---------------------------------------------------------------------------
# electronVersion: "33.0.0"  # Uncomment/adjust to pin Electron version
# buildVersionFrom: package.json
